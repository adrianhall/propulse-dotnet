name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        
    - name: Install dotnet tools
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore
      
    - name: Test with coverage
      run: |
        mkdir -p coverage-results
        dotnet test --no-build --verbosity normal \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:ExcludeByFile="**/Program.cs" \
          /p:CoverletOutput="coverage-results/"
          
    - name: Generate coverage reports
      run: |
        projects=$(find src -type d -not -path "*/\.*" -not -path "*/bin/*" -not -path "*/obj/*" \
          -not -path "*AppHost*" -not -path "*ServiceDefaults*" -not -path "*.Tests*" -mindepth 1 -maxdepth 1)
        
        # Generate HTML report for all projects
        reportgenerator \
          -reports:"coverage-results/coverage.cobertura.xml" \
          -targetdir:"coverage-results/report" \
          -reporttypes:Html,TextSummary
          
        # Display coverage summary
        cat coverage-results/report/Summary.txt
        
        # Generate per-project reports
        for project in $projects; do
          project_name=$(basename "$project")
          echo "Generating coverage report for $project_name..."
          
          reportgenerator \
            -reports:"coverage-results/coverage.cobertura.xml" \
            -targetdir:"coverage-results/report-$project_name" \
            -reporttypes:Html,MarkdownSummary \
            -filefilters:"+$project/**/*" \
            -title:"$project_name Coverage Report"
            
          # Create project summary for GitHub PR comment
          if [ -f "coverage-results/report-$project_name/Summary.md" ]; then
            echo "## $project_name Coverage" >> coverage-results/pr-comment.md
            cat "coverage-results/report-$project_name/Summary.md" >> coverage-results/pr-comment.md
            echo "" >> coverage-results/pr-comment.md
          fi
        done
    
    - name: Generate Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage-results/coverage.cobertura.xml
        format: markdown
        output: both
        badge: true
        fail_below_min: false
        hide_branch_rate: false
        hide_complexity: false
        indicators: true
        thresholds: '70 90'

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage-report
        path: coverage-results
        
    - name: Post Coverage Summary as PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md
        
    - name: Publish
      if: github.ref == 'refs/heads/main'
      run: dotnet publish src/ProPulse.Web/ProPulse.Web.csproj -c Release -o publish
